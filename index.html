<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-wrapper">

  <!-- Header -->
  <div class="app-header">
    <h1>📝 My Tasks</h1>
    <p class="date" id="currentDate"></p>
    <div class="stats">
      <div class="stat-box">
        <span id="totalCount">0</span>
        <p>Total</p>
      </div>
      <div class="stat-box">
        <span id="doneCount">0</span>
        <p>Done</p>
      </div>
      <div class="stat-box">
        <span id="pendingCount">0</span>
        <p>Pending</p>
      </div>
    </div>
  </div>

  <!-- Input Area -->
  <div class="input-section">
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Add a new task...">
      <select id="prioritySelect">
        <option value="low">🟢 Low</option>
        <option value="medium" selected>🟡 Medium</option>
        <option value="high">🔴 High</option>
      </select>
      <button onclick="addTask()" class="add-btn">+ Add</button>
    </div>
  </div>

  <!-- Filter Buttons -->
  <div class="filters">
    <button class="filter-btn active" onclick="filterTasks('all', this)">All</button>
    <button class="filter-btn" onclick="filterTasks('pending', this)">Pending</button>
    <button class="filter-btn" onclick="filterTasks('completed', this)">Completed</button>
    <button class="filter-btn" onclick="filterTasks('high', this)">🔴 High</button>
    <button class="clear-btn" onclick="clearCompleted()">Clear Done</button>
  </div>

  <!-- Task List -->
  <div class="task-list" id="taskList"></div>

  <!-- Empty Message -->
  <div class="empty-msg" id="emptyMsg">
    <p>🎉 No tasks here!</p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
